<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{HEADLINE}} — selfhost.nyc News</title>
    <meta name="description" content="{{SUMMARY}}">
    <meta property="og:title" content="{{HEADLINE}} — selfhost.nyc">
    <meta property="og:description" content="{{SUMMARY}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://selfhost.nyc/news/{{SLUG}}">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --red: #e63617;
            --black: #000;
            --white: #fff;
            --gray: #888;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--black);
            color: var(--white);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            z-index: 100;
        }
        nav .logo {
            font-weight: 700;
            font-size: 1rem;
            color: var(--white);
            text-decoration: none;
        }
        nav .links a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.8rem;
            margin-left: 1.5rem;
            transition: color 0.2s;
        }
        nav .links a:hover { color: var(--white); }
        
        main {
            max-width: 700px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }
        .back-link {
            display: inline-block;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .back-link:hover { color: var(--white); }
        
        .tag {
            display: inline-block;
            background: var(--red);
            color: var(--white);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.3rem 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }
        .tag.ice { background: #c41e3a; }
        .tag.military { background: #8b0000; }
        .tag.surveillance { background: #4a0080; }
        .tag.alternatives { background: #006400; }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
        }
        
        .meta {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .meta time { color: var(--white); }
        .meta .source { margin-left: 1rem; }
        
        .summary {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.85);
            border-left: 3px solid var(--red);
            padding-left: 1.5rem;
            margin: 2rem 0;
        }
        
        .our-take {
            background: rgba(255,255,255,0.03);
            padding: 2rem;
            margin: 2rem 0;
            border-radius: 4px;
        }
        .our-take h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--red);
        }
        
        .read-original {
            display: inline-block;
            background: var(--white);
            color: var(--black);
            font-weight: 600;
            padding: 1rem 2rem;
            text-decoration: none;
            margin-top: 1rem;
        }
        .read-original:hover {
            background: var(--red);
            color: var(--white);
        }
        
        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--gray);
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">selfhost.nyc</a>
        <div class="links">
            <a href="/news/">News</a>
            <a href="/">Home</a>
        </div>
    </nav>
    
    <main>
        <a href="/news/" class="back-link">← All News</a>
        
        <span class="tag {{TAG}}">{{TAG_DISPLAY}}</span>
        
        <h1>{{HEADLINE}}</h1>
        
        <div class="meta">
            <time datetime="{{DATE_ISO}}">{{DATE_DISPLAY}}</time>
            <span class="source">via {{SOURCE}}</span>
        </div>
        
        <div class="summary">
            {{SUMMARY}}
        </div>
        
        <div class="our-take">
            <h2>Why This Matters for NYC</h2>
            <p>{{OUR_TAKE}}</p>
        </div>
        
        <a href="{{ORIGINAL_URL}}" class="read-original" target="_blank" rel="noopener">
            Read the original report →
        </a>
    </main>
    
    <footer>
        <p>selfhost.nyc — New York City's campaign for digital sovereignty</p>
    </footer>
</body>
</html>
